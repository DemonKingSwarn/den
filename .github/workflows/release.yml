# Fail first (if something fails, add manually. Don't create a new tag)
name: Release the Package

on:
  push:
    tags:
      - "v*"

jobs:
  linting-and-testing:
    uses: ./.github/workflows/linting_and_testing.yml

  # -------------------------
  # PyPI
  # -------------------------
  pypi:
    needs: linting-and-testing
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade pip build twine

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # -------------------------
  # AUR
  # -------------------------
  aur:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate AUR data
        run: bash ./packaging/arch/generate-data.bash

      - name: Publish AUR package
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.2
        with:
          pkgname: den
          pkgbuild: PKGBUILD
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: Update AUR package
          ssh_keyscan_types: rsa,ecdsa,ed25519
          updpkgsums: true

  # -------------------------
  # Debian
  # -------------------------
  debian:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Debian build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            debhelper \
            dh-python \
            devscripts \
            fakeroot \
            python3-all \
            python3-hatchling \
            python3-build \
            python3-installer \
            pybuild-plugin-pyproject

      - name: Generate Debian data
        run: bash ./packaging/debian/generate-data.bash

      - name: Prepare debian directory
        run: cp -r packaging/debian debian

      - name: Build Debian package
        run: |
          export DEB_BUILD_OPTIONS="nocheck"
          dpkg-buildpackage -us -uc -b

      - name: Upload Debian package
        uses: softprops/action-gh-release@v2
        with:
          files: ../*.deb
