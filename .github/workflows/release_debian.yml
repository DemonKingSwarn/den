name: Release Package to GitHub Releases

on:
  push:
    tags:
      - "*"

jobs:
  linting-and-testing:
    uses: ./.github/workflows/linting_and_testing.yml

  release:
    needs: linting-and-testing
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Debian build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            debhelper \
            dh-python \
            devscripts \
            fakeroot \
            python3-all \
            python3-hatchling \
            python3-build \
            python3-installer \
            pybuild-plugin-pyproject

      - name: Prepare debian directory
        run: cp -r packaging/debian debian

      - name: Build Debian package
        run: |
          export DEB_BUILD_OPTIONS="nocheck"
          dpkg-buildpackage -us -uc -b

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: ../*.deb
